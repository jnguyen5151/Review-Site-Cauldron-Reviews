# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - CauldronReviewsFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'
      - name: Create environment files
        run: |
          cat > src/environments/environment.ts << EOF
          export const environment = {
            production: false,
            apiUrl: '${{ secrets.API_URL }}',
            frontendUrl: '${{ secrets.FRONTEND_URL }}'
          };
          EOF
          cat > src/environments/environment.prod.ts << EOF
          export const environment = {
            production: true,
            apiUrl: '${{ secrets.API_URL }}',
            frontendUrl: '${{ secrets.FRONTEND_URL }}'
          };
          EOF
        working-directory: ReviewApp
      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
        working-directory: ReviewApp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ReviewApp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_195F3A0DB1B1452DA2C919DAD936D5BC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_941B068FF605454585F62B25931C2D9D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F9A482A489F149C7A4FE2C1B3C4D7E68 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CauldronReviewsFront'
          slot-name: 'Production'
          package: .
          
